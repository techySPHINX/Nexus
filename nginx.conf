# ─────────────────────────────────────────────────────────────────────────────
# Nginx Production Configuration — Nexus Platform
#
# HTTPS is managed via Let's Encrypt certificates mounted at runtime.
# Expected paths (matches docker-compose.production.yml ssl volume):
#   /etc/nginx/ssl/cert.pem
#   /etc/nginx/ssl/key.pem
#
# To obtain certificates with Certbot (standalone, before first deploy):
#   certbot certonly --standalone -d your-domain.com -d www.your-domain.com
#   cp /etc/letsencrypt/live/your-domain.com/fullchain.pem ./ssl/cert.pem
#   cp /etc/letsencrypt/live/your-domain.com/privkey.pem   ./ssl/key.pem
# ─────────────────────────────────────────────────────────────────────────────
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Do NOT advertise nginx version in Server header — reduces attack surface
    server_tokens off;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Basic Settings
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Limit request body to 10 MB — prevents basic DoS via large payloads
    client_max_body_size 10M;

    # Gzip Settings
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Rate Limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=ws:10m  rate=5r/s;

    # ── Upstream definitions ─────────────────────────────────────────────────

    upstream backend_servers {
        least_conn;
        server backend:3000 max_fails=3 fail_timeout=30s;
    }

    # Sticky sessions required for WebSocket — ip_hash pins a client to one
    # backend replica so the persistent socket upgrade succeeds.
    upstream websocket_servers {
        ip_hash;
        server backend:3000;
    }

    upstream frontend_servers {
        server frontend:80;
    }

    # ── HTTP → HTTPS redirect ────────────────────────────────────────────────
    # All plain-HTTP requests are immediately redirected to HTTPS.
    server {
        listen 80;
        server_name _;

        # ACME challenge path for Certbot webroot renewal (cert renewal without
        # taking the server offline).
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ─────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # ── TLS certificates (Let's Encrypt via Certbot) ─────────────────────
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # Only modern, secure TLS versions
        ssl_protocols TLSv1.2 TLSv1.3;

        # Prefer server-side cipher order; strong ciphers only
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;

        # TLS session caching for performance
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP Stapling — avoids client round-trip to CA for cert validity check
        ssl_stapling        on;
        ssl_stapling_verify on;

        # ── Security headers (applied globally; child location blocks that add
        #    their own add_header directives MUST repeat these, because nginx
        #    drops parent add_header directives when a child block defines any) ─

        # HSTS: tell browsers to require HTTPS for the next 2 years
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss: https:;" always;

        # ── Health check ─────────────────────────────────────────────────────
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
            # Repeat security headers — child block overrides parent add_header
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # ── API routes ───────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://backend_servers;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            proxy_connect_timeout 5s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # Repeat security headers
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header X-Permitted-Cross-Domain-Policies "none" always;
        }

        # ── WebSocket routes ─────────────────────────────────────────────────
        location /ws/ {
            limit_req zone=ws burst=10 nodelay;

            proxy_pass http://websocket_servers;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket connections are long-lived; use generous timeouts.
            # 7 s was too short and killed active sockets — now 1 hour.
            proxy_connect_timeout 10s;
            proxy_send_timeout    3600s;
            proxy_read_timeout    3600s;
        }

        # ── Static assets ────────────────────────────────────────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://frontend_servers;
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary Accept-Encoding;
            # Repeat security headers
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
        }

        # ── Frontend SPA ─────────────────────────────────────────────────────
        location / {
            proxy_pass http://frontend_servers;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            proxy_connect_timeout 5s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # Repeat security headers
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header X-Permitted-Cross-Domain-Policies "none" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss: https:;" always;
        }

        # ── Error pages ──────────────────────────────────────────────────────
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;

        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
