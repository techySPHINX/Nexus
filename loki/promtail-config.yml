# ─────────────────────────────────────────────────────────────────────────────
# Promtail configuration for Nexus Platform
#
# Promtail tails the JSON-format logs written by the Docker json-file logging
# driver for each Nexus container and ships them to Loki.
#
# How Docker log paths work:
#   /var/lib/docker/containers/<container-id>/<container-id>-json.log
#
# We use the Docker service discovery so Promtail automatically picks up new
# containers without a config change.
# ─────────────────────────────────────────────────────────────────────────────

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ── Docker container logs ────────────────────────────────────────────────
  - job_name: nexus_containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
        filters:
          # Only tail containers with docker-compose label "com.docker.compose.project"
          - name: label
            values: ["com.docker.compose.project"]

    relabel_configs:
      # Use the container name as the "service" label
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: service

      # Forward the image name
      - source_labels: [__meta_docker_container_image]
        target_label: image

      # Forward the compose service label
      - source_labels: [__meta_docker_compose_service]
        target_label: compose_service

      # Add a constant job label
      - replacement: nexus
        target_label: job

    # Parse Docker's JSON log format so the "log" key becomes the log line
    pipeline_stages:
      - json:
          expressions:
            log: log
            stream: stream
            time: time

      # Use Docker's original log timestamp instead of ingestion time
      - timestamp:
          source: time
          format: RFC3339Nano

      # Promote the inner "log" field to the actual log line
      - output:
          source: log

      # Detect log level from the NestJS log format:
      # [Timestamp] LOG  message
      # [Timestamp] WARN message
      # [Timestamp] ERROR message
      - regex:
          expression: '^\[.*?\]\s+(?P<level>LOG|WARN|ERROR|DEBUG|VERBOSE)\s+'

      - labels:
          level:
          stream:
