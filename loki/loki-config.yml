# ─────────────────────────────────────────────────────────────────────────────
# Loki configuration for Nexus Platform
#
# Grafana Loki 2.9.x — single-instance mode suitable for a single-server
# production deployment.  For multi-replica / massive scale, switch to the
# microservices target mode and use object-store (S3/GCS) for ingester WAL.
# ─────────────────────────────────────────────────────────────────────────────

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

# Schema configuration — boltdb-shipper (fsstore) for simplicity
schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: loki_index_
        period: 24h

ruler:
  alertmanager_url: http://localhost:9093

# Retention — keep logs for 30 days
limits_config:
  retention_period: 720h    # 30 days

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  retention_delete_delay: 2h

# Ingester settings — single replica
ingester:
  chunk_idle_period: 5m
  chunk_retain_period: 30s
  wal:
    dir: /loki/wal
