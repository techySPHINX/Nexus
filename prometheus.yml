# ─────────────────────────────────────────────────────────────────────────────
# Prometheus Configuration — Nexus Platform
#
# Mounted read-only into the Prometheus container by docker-compose.production.yml:
#   ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
# ─────────────────────────────────────────────────────────────────────────────

global:
  # How frequently Prometheus scrapes targets by default
  scrape_interval: 15s
  # How long until a scrape request times out
  scrape_timeout: 10s
  # How frequently rules are evaluated
  evaluation_interval: 15s

  # External labels attached to any time series or alerts when communicating
  # with external systems (Alertmanager, remote storage, etc.)
  external_labels:
    environment: production
    project: nexus

# ── Alerting rules ────────────────────────────────────────────────────────────
rule_files:
  - /etc/prometheus/alerts.yml

# ── Alertmanager integration (configure when Alertmanager is deployed) ────────
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ["alertmanager:9093"]

# ── Scrape configurations ─────────────────────────────────────────────────────
scrape_configs:
  # Prometheus scrapes its own metrics (self-monitoring)
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # NestJS backend — exposes /metrics via prom-client (MetricsModule)
  - job_name: nexus_backend
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["backend:3000"]
        labels:
          service: backend
          environment: production

  # Node Exporter (if deployed) for host-level OS metrics
  # - job_name: node_exporter
  #   static_configs:
  #     - targets: ["node-exporter:9100"]
